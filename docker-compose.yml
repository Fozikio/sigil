# Sigil — Agent Control Surface
# One server. Pub/sub + dashboard + gestures + commands.
# Run: docker compose up -d

services:
  sigil:
    build: ./server
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      - PORT=8090
      - SIGIL_DB=/app/data/sigil.db
    volumes:
      - sigil-data:/app/data
    restart: unless-stopped

  webhook:
    build: ../../Services/webhook-listener
    ports:
      - "3847:3847"
    env_file: .env
    environment:
      - WEBHOOK_PORT=3847
    restart: unless-stopped

volumes:
  sigil-data:
